name: Deploy to GitHub Pages

on:
  push:
    branches: [deploy-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
      NUXT_PUBLIC_SUPABASE_URL: ${{ vars.NUXT_PUBLIC_SUPABASE_URL != '' && vars.NUXT_PUBLIC_SUPABASE_URL || secrets.NUXT_PUBLIC_SUPABASE_URL }}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NUXT_PUBLIC_SUPABASE_ANON_KEY != '' && vars.NUXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
      NUXT_PUBLIC_AUTH_REDIRECT_URL: ${{ vars.NUXT_PUBLIC_AUTH_REDIRECT_URL != '' && vars.NUXT_PUBLIC_AUTH_REDIRECT_URL || secrets.NUXT_PUBLIC_AUTH_REDIRECT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
